<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Sad pixel face" shape-rendering="crispEdges">
  <!-- Dark background -->
  <rect width="32" height="32" rx="4" fill="#0e1f1b"/>
  <!-- Left eye (2x2 "pixel" blocks at 2px scale) -->
  <rect x="8" y="8" width="4" height="4" fill="#cce5db"/>
  <!-- Right eye -->
  <rect x="20" y="8" width="4" height="4" fill="#cce5db"/>
  <!-- Worried left brow (angled inward) -->
  <rect x="12" y="4" width="4" height="2" fill="#7cb8a8"/>
  <rect x="8" y="6" width="4" height="2" fill="#7cb8a8"/>
  <!-- Worried right brow (angled inward) -->
  <rect x="16" y="4" width="4" height="2" fill="#7cb8a8"/>
  <rect x="20" y="6" width="4" height="2" fill="#7cb8a8"/>
  <!-- Frown - top of inverted curve -->
  <rect x="12" y="18" width="8" height="4" fill="#cce5db"/>
  <!-- Frown - sides going down -->
  <rect x="8" y="22" width="4" height="4" fill="#cce5db"/>
  <rect x="20" y="22" width="4" height="4" fill="#cce5db"/>
</svg>