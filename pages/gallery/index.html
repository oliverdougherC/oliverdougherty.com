<!DOCTYPE html>
<html lang="en" data-theme="gallery" data-disable-color-mode="true">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery - Oliver Dougherty</title>
  <meta name="description" content="Layered photo overview and index inspired by unveil.fr.">
  <link rel="icon" type="image/svg+xml" href="../../favicon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../../css/design-system.css">
  <link rel="stylesheet" href="../../css/gallery.css">

  <script type="importmap">
    {
      "imports": {
        "three": "https://esm.sh/three@0.162.0",
        "lenis": "https://esm.sh/lenis@1.3.11",
        "gsap": "https://esm.sh/gsap@3.12.5"
      }
    }
  </script>
</head>
<body class="gallery-page">
  <main class="gallery-shell" id="galleryShell" data-mode="overview" data-gallery-shell="unveil">
    <canvas id="galleryWebglCanvas" class="gallery-canvas" aria-hidden="true"></canvas>

    <header class="gallery-tab-rail" id="galleryTabRail" aria-label="Primary navigation">
      <a href="../../index.html" class="gallery-tab gallery-tab--active">Oliver &reg;</a>
      <a href="../archive/index.html" class="gallery-tab">Research</a>
      <a href="../resume/index.html" class="gallery-tab">Studio</a>
      <a href="mailto:oliverfdougherty@gmail.com" class="gallery-tab">Contact</a>
    </header>

    <section class="gallery-hud" aria-label="Gallery navigation">
      <div class="gallery-counter" id="galleryCounter" role="status" aria-live="polite">01 / 01</div>
      <div class="gallery-caption" id="galleryCaption">Loading sequence...</div>

      <div class="gallery-mode-switch" id="galleryModeSwitch" role="tablist" aria-label="Gallery mode">
        <button
          type="button"
          id="galleryModeOverview"
          class="gallery-mode-btn is-active"
          data-mode="overview"
          role="tab"
          aria-selected="true"
          aria-controls="galleryShell"
        >
          Overview
        </button>
        <button
          type="button"
          id="galleryModeIndex"
          class="gallery-mode-btn"
          data-mode="index"
          role="tab"
          aria-selected="false"
          aria-controls="galleryIndexPanel"
        >
          Index
        </button>
      </div>
    </section>

    <section
      class="gallery-index-panel"
      id="galleryIndexPanel"
      aria-label="Photo index"
      data-lenis-prevent
      hidden
    >
      <header class="gallery-index-head" aria-hidden="true">
        <span>Year</span>
        <span>Photo</span>
        <span>Category</span>
      </header>
      <ol id="galleryIndexList" class="gallery-index-list"></ol>
    </section>

    <div class="sr-only" id="gallerySrDesc" aria-live="polite" role="status"></div>
    <div class="gallery-scroll-track" id="galleryScrollTrack" aria-hidden="true"></div>
  </main>

  <footer class="footer gallery-footer">
    <div class="container">
      <div class="footer-inner">
        <p class="footer-text">&copy; <span data-current-year>2026</span> Oliver Dougherty</p>
      </div>
    </div>
  </footer>

  <script src="../../js/year.js" defer></script>
  <script type="module" src="../../js/gallery.js"></script>
</body>
</html>
